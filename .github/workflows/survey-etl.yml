name: Survey ETL Pipeline (Multi-Job Parallel)

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
        type: string
      survey_file:
        description: 'Tên file (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'
        type: string

jobs:
  # Job 1: Cài ODBC Driver (chạy song song với Job 2)
  install-odbc:
    runs-on: ubuntu-latest
    steps:
      - name: Install ODBC Driver 18
        run: |
          echo "Installing ODBC Driver..."
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18
          echo "✅ ODBC Driver installed"
          # Lưu trạng thái
          echo "ODBC_INSTALLED=true" >> $GITHUB_ENV
  
  # Job 2: Cài Python dependencies (chạy song song với Job 1)
  install-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install Python dependencies
        run: |
          echo "Installing Python dependencies..."
          pip install pandas numpy pyodbc azure-storage-blob
          echo "✅ Python dependencies installed"
  
  # Job 3: Chạy ETL (đợi cả 2 job trên hoàn thành)
  run-etl:
    needs: [install-odbc, install-python]  # Đợi cả 2 job hoàn thành
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install ODBC Driver (đã cache 1 phần)
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
      
      - name: Install Python deps (dùng cache)
        run: pip install pandas numpy pyodbc azure-storage-blob
      
      - name: Run ETL Pipeline
        env:
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python etl.py
