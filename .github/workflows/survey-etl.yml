name: Survey ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
        type: string
      survey_file:
        description: 'Tên file (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'
        type: string

env:
  PYTHON_VERSION: '3.10'

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: ✅ Validate inputs
      run: |
        echo "=== VALIDATING INPUTS ==="
        echo "Semester: ${{ github.event.inputs.semester }}"
        echo "Survey file: ${{ github.event.inputs.survey_file }}"
        
        if [[ ! "${{ github.event.inputs.survey_file }}" =~ \.csv$ ]]; then
          echo "❌ Error: Survey file must be a CSV file"
          exit 1
        fi
        
        echo "✅ Inputs validated"
    
    - name: 🚀 Run ETL Pipeline
      env:
        CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        SEMESTER: ${{ github.event.inputs.semester }}
        SURVEY_FILE: ${{ github.event.inputs.survey_file }}
      run: |
        echo "=== STARTING ETL PIPELINE ==="
        echo "Semester: $SEMESTER"
        echo "Survey file: $SURVEY_FILE"
        echo "Connection string exists: ${{ secrets.AZURE_CONNECTION_STRING != '' }}"
        echo "DB password exists: ${{ secrets.DB_PASSWORD != '' }}"
        python main.py "$SEMESTER" "$SURVEY_FILE"
        echo "=== ETL PIPELINE COMPLETED ==="
    
    - name: 📤 Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: etl-logs-${{ github.run_id }}-${{ github.run_attempt }}
        path: logs/
        retention-days: 30
    
    - name: 📊 Summary
      if: always()
      run: |
        echo "## ETL Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Semester | ${{ github.event.inputs.semester }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Survey File | ${{ github.event.inputs.survey_file }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
