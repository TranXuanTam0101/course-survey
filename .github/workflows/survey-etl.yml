name: Survey ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
        type: string
      survey_file:
        description: 'Tên file (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'
        type: string

jobs:
  # ================= JOB 1: TIỀN XỬ LÝ DỮ LIỆU (KHÔNG CẦN ODBC) =================
  preprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create directories
        run: |
          mkdir -p preprocessed-data
          mkdir -p processed-data
          echo "✅ Directories created"
      
      - name: Install Python dependencies (No ODBC needed)
        run: |
          echo "📦 Installing Python packages..."
          python -m pip install --upgrade pip -q
          pip install -q pandas numpy pyarrow azure-storage-blob
          echo "✅ Python dependencies installed"
      
      - name: List files before run
        run: |
          echo "📁 Current directory:"
          ls -la
          echo "📁 Checking for etl.py:"
          ls -la etl.py || echo "⚠️ etl.py not found!"
      
      - name: Run Preprocess (ETL.py)
        env:
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
        run: |
          echo "🚀 Starting JOB 1: Preprocessing data..."
          echo "   Semester: $SEMESTER"
          echo "   Survey file: $SURVEY_FILE"
          python etl.py
          echo "✅ JOB 1 completed!"
      
      - name: List generated files
        run: |
          echo "📁 Files in preprocessed-data:"
          ls -la preprocessed-data/ 2>/dev/null || echo "  (empty or directory not found)"
          echo "📁 Files in processed-data:"
          ls -la processed-data/ 2>/dev/null || echo "  (empty or directory not found)"
      
      - name: Upload preprocessed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data-${{ github.run_id }}
          path: |
            preprocessed-data/
            processed-data/
          if-no-files-found: warn
          retention-days: 1
      
      - name: Upload to Azure Blob Storage (backup)
        env:
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
          SEMESTER: ${{ github.event.inputs.semester }}
        run: |
          echo "📤 Uploading to Azure Blob Storage as backup..."
          python -c "
          import os
          import glob
          from azure.storage.blob import BlobServiceClient
          
          conn_str = os.environ.get('CONNECTION_STRING')
          semester = os.environ.get('SEMESTER')
          
          if not conn_str or not semester:
              print('⚠️ Cannot upload to Azure: missing credentials')
              exit(0)
          
          try:
              blob_service = BlobServiceClient.from_connection_string(conn_str)
              container_name = semester
              
              # Ensure container exists
              try:
                  blob_service.create_container(container_name)
              except:
                  pass
              
              # Upload preprocessed-data
              for file_path in glob.glob('preprocessed-data/*.pkl'):
                  blob_name = f'preprocessed-data/{os.path.basename(file_path)}'
                  with open(file_path, 'rb') as f:
                      blob_service.get_container_client(container_name).get_blob_client(blob_name).upload_blob(f, overwrite=True)
                  print(f'  ✅ Uploaded: {blob_name}')
              
              # Upload processed-data
              for file_path in glob.glob('processed-data/*.csv'):
                  blob_name = f'processed-data/{os.path.basename(file_path)}'
                  with open(file_path, 'rb') as f:
                      blob_service.get_container_client(container_name).get_blob_client(blob_name).upload_blob(f, overwrite=True)
                  print(f'  ✅ Uploaded: {blob_name}')
                  
              print('✅ Backup upload completed!')
          except Exception as e:
              print(f'⚠️ Upload to Azure failed: {e}')
          "

  # ================= JOB 2: LOAD DỮ LIỆU (CẦN ODBC) =================
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preprocess
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create directories
        run: |
          mkdir -p preprocessed-data
          mkdir -p processed-data
      
      - name: Download artifact from preprocess job
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-data-${{ github.run_id }}
          path: .
      
      - name: List downloaded files
        run: |
          echo "📁 Downloaded files:"
          echo "preprocessed-data:"
          ls -la preprocessed-data/ 2>/dev/null || echo "  (empty)"
          echo "processed-data:"
          ls -la processed-data/ 2>/dev/null || echo "  (empty)"
      
      - name: Install ODBC Driver and Python dependencies
        run: |
          echo "[1/3] Installing ODBC Driver..."
          curl -s https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -s https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 mssql-tools18
          echo "✅ ODBC Driver installed"
          
          echo "[2/3] Installing Python dependencies..."
          python -m pip install --upgrade pip -q
          pip install -q pandas numpy pyodbc azure-storage-blob
          echo "✅ Python dependencies installed"
          
          echo "[3/3] Testing ODBC connection..."
          python -c "
          import pyodbc
          print('✅ pyodbc imported successfully')
          "
          echo "🎉 ALL DEPENDENCIES INSTALLED!"
      
      - name: Run Load (load.py)
        env:
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "🚀 Starting JOB 2: Loading data to database..."
          echo "   Semester: $SEMESTER"
          echo "   Survey file: $SURVEY_FILE"
          python load.py
          echo "✅ JOB 2 completed!"
      
      - name: Verify insertion
        run: |
          echo "📊 Data loading completed!"
          echo "✅ Pipeline finished successfully!"
