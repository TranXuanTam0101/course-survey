name: Survey ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
        type: string
      survey_file:
        description: 'Tên file (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'
        type: string
jobs:
  # Job 1: Split file và parse song song
  split-and-parse:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.split.outputs.chunks }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install pandas azure-storage-blob
      
      - name: Download and Split
        id: split
        run: |
          python -c "
          import os
          from azure.storage.blob import BlobServiceClient
          
          blob_service = BlobServiceClient.from_connection_string('${{ secrets.CONNECTION_STRING }}')
          blob_client = blob_service.get_container_client('rawdata').get_blob_client('${{ github.event.inputs.semester }}/${{ github.event.inputs.survey_file }}')
          data = blob_client.download_blob().readall().decode('utf-8-sig')
          lines = data.strip().split('\n')
          
          # Chia thành 8 chunks
          chunk_size = len(lines) // 8
          for i in range(8):
              start = i * chunk_size
              end = (i + 1) * chunk_size if i < 7 else len(lines)
              chunk = '\n'.join(lines[start:end])
              
              # Upload chunk lên blob
              chunk_blob = blob_service.get_container_client('chunks').get_blob_client(f'${{ github.event.inputs.semester }}/chunk_{i}.csv')
              chunk_blob.upload_blob(chunk, overwrite=True)
          
          print(f'::set-output name=chunks::8')
          "
  
  # Job 2: Parse từng chunk song song (8 jobs chạy cùng lúc)
  parse-chunk:
    needs: split-and-parse
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install pandas azure-storage-blob
      
      - name: Parse Chunk ${{ matrix.chunk }}
        run: python parse_chunk.py ${{ matrix.chunk }}
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          SEMESTER: ${{ github.event.inputs.semester }}
          CHUNK_ID: ${{ matrix.chunk }}
  
  # Job 3: Load Dimensions (chạy 1 lần từ chunk đầu tiên)
  load-dimensions:
    needs: parse-chunk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install pandas pymssql azure-storage-blob
      
      - name: Load Dimensions
        run: python load_dimensions.py
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  
  # Job 4: Load Fact từ các chunk đã parse
  load-fact:
    needs: load-dimensions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install pandas pymssql azure-storage-blob
      
      - name: Load Fact Chunk ${{ matrix.chunk }}
        run: python load_fact_chunk.py ${{ matrix.chunk }}
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
