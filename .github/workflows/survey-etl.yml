name: Survey ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
        type: string
      survey_file:
        description: 'Tên file (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'
        type: string

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas
          pip install azure-storage-blob
          pip install ftfy
          pip install pyodbc
          pip install sqlalchemy
          pip install numpy
      
      - name: Install ODBC Driver for SQL Server
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          sudo apt-get install -y odbcinst
          sudo apt-get install -y msodbcsql18
        env:
          ACCEPT_EULA: Y
      
      - name: Run ETL
        run: python etl.py
        env:
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
