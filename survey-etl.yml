name: Survey ETL Pipeline

on:
  workflow_dispatch:  # 👈 Chỉ chạy khi bạn bấm nút manual
    inputs:
      semester:
        description: 'Năm học (VD: 2024-2025)'
        required: true
        default: '2024-2025'
      survey_file:
        description: 'Tên file khảo sát (VD: khaosat_252.csv)'
        required: true
        default: 'khaosat_252.csv'

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas azure-storage-blob
      
      - name: Run ETL
        env:
          CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
          SEMESTER: ${{ github.event.inputs.semester }}
          SURVEY_FILE: ${{ github.event.inputs.survey_file }}
        run: python etl.py
